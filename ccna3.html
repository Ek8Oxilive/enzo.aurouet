<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 3 ENSA v7 — Quiz Live</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060a12;
  --bg2: #0d1320;
  --bg3: #141c2e;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --text: #c8d6e5;
  --text2: #6b7c93;
  --accent: #0ef6cc;
  --accent2: #6c5ce7;
  --correct: #00e676;
  --wrong: #ff5252;
  --font: 'IBM Plex Mono', monospace;
  --fontH: 'Outfit', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 0%, #0ef6cc08 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, #6c5ce708 0%, transparent 50%); pointer-events: none; z-index: 0; }

.container { max-width: 800px; margin: 0 auto; padding: 30px 20px; position: relative; z-index: 1; }

/* Loading */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; }
.loader { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--fontH); font-size: 16px; color: var(--text2); }
.loading-sub { font-size: 12px; color: var(--text2); opacity: 0.6; }
.loading-progress { width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s ease; }

/* Error */
.error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; text-align: center; }
.error-icon { font-size: 48px; }
.error-msg { font-family: var(--fontH); font-size: 18px; color: var(--wrong); }
.error-detail { font-size: 13px; color: var(--text2); max-width: 400px; line-height: 1.6; }
.error-detail a { color: var(--accent); }
.manual-paste { width: 100%; max-width: 500px; margin-top: 16px; }
.manual-paste textarea { width: 100%; height: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 12px; padding: 12px; resize: vertical; }
.manual-paste textarea:focus { outline: none; border-color: var(--accent); }

/* Buttons */
.btn { border: none; border-radius: 10px; padding: 14px 24px; font-family: var(--fontH); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn-primary { background: linear-gradient(135deg, var(--accent), #0ac4a0); color: #060a12; }
.btn-primary:hover { box-shadow: 0 8px 30px rgba(14,246,204,0.3); }
.btn-secondary { background: linear-gradient(135deg, var(--accent2), #5a4bd1); color: white; }
.btn-secondary:hover { box-shadow: 0 8px 30px rgba(108,92,231,0.3); }
.btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }

/* Home */
.home-header { text-align: center; margin-bottom: 48px; animation: fadeUp 0.6s ease; }
.badge { display: inline-block; background: rgba(14,246,204,0.08); border: 1px solid rgba(14,246,204,0.2); border-radius: 20px; padding: 6px 18px; font-size: 10px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
.badge::before { content: '●'; margin-right: 8px; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.home-title { font-family: var(--fontH); font-size: clamp(32px, 6vw, 56px); font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 14px; }
.home-title span:first-child { color: var(--accent); }
.home-title span:last-child { color: var(--accent2); }
.home-sub { color: var(--text2); font-size: 14px; line-height: 1.6; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; animation: fadeUp 0.8s ease; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 14px; text-align: center; }
.stat-val { font-family: var(--fontH); font-size: 22px; font-weight: 700; color: #f0f4f8; }
.stat-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.action-btn { border-radius: 14px; padding: 22px 16px; text-align: center; cursor: pointer; border: none; font-family: var(--fontH); transition: all 0.2s; }
.action-btn:hover { transform: translateY(-2px); }
.action-btn .label { font-size: 16px; font-weight: 700; display: block; }
.action-btn .desc { font-size: 11px; opacity: 0.7; margin-top: 4px; display: block; font-weight: 400; }

.cat-title { font-family: var(--fontH); font-size: 13px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin: 32px 0 14px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: left; cursor: pointer; transition: all 0.2s; color: var(--text); font-family: inherit; display: flex; align-items: center; gap: 10px; }
.cat-btn:hover { background: rgba(255,255,255,0.06); }
.cat-icon { font-size: 20px; }
.cat-name { font-size: 13px; font-weight: 600; }
.cat-count { font-size: 10px; color: var(--text2); }

/* Quiz */
.quiz-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-track { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.q-cat { background: rgba(14,246,204,0.1); color: var(--accent); font-size: 11px; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px; }
.q-score { font-size: 12px; color: var(--text2); }
.q-score b { color: var(--correct); }
.q-sitenum { background: rgba(108,92,231,0.15); color: var(--accent2); font-size: 10px; padding: 3px 8px; border-radius: 5px; letter-spacing: 0.5px; font-family: var(--font); font-weight: 600; border: 1px solid rgba(108,92,231,0.25); }
.q-text { font-family: var(--fontH); font-size: clamp(15px, 3vw, 19px); font-weight: 600; line-height: 1.55; color: #e8edf5; margin-bottom: 8px; white-space: pre-wrap; }
.q-multi { font-size: 11px; color: var(--accent2); margin-bottom: 16px; }
.q-images { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.q-images img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border); background: #1a2236; }

.opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.opt { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; text-align: left; cursor: pointer; transition: all 0.15s; color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5; display: flex; gap: 12px; align-items: flex-start; white-space: pre-wrap; }
.opt:hover:not(.done) { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
.opt.selected { background: rgba(14,246,204,0.08); border-color: rgba(14,246,204,0.35); color: #b8fff0; }
.opt.correct { background: rgba(0,230,118,0.08); border-color: rgba(0,230,118,0.4); color: #69f0ae; }
.opt.wrong { background: rgba(255,82,82,0.08); border-color: rgba(255,82,82,0.4); color: #ff8a80; animation: shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.opt-marker { min-width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: var(--text2); transition: all 0.15s; }
.opt.selected .opt-marker { border-color: var(--accent); background: var(--accent); color: var(--bg); }
.opt.correct .opt-marker { border-color: var(--correct); background: var(--correct); color: var(--bg); }
.opt.wrong .opt-marker { border-color: var(--wrong); background: var(--wrong); color: white; }
.opt-marker.multi { border-radius: 4px; }

.expl-toggle { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
.expl-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }

.timer { background: rgba(14,246,204,0.1); border: 1px solid rgba(14,246,204,0.25); border-radius: 8px; padding: 4px 12px; font-size: 14px; font-weight: 600; color: var(--accent); }
.timer.danger { background: rgba(255,82,82,0.1); border-color: rgba(255,82,82,0.3); color: var(--wrong); }

/* Results */
.result-hero { text-align: center; margin-bottom: 40px; animation: scaleIn 0.5s ease; }
@keyframes scaleIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-emoji { font-size: 52px; margin-bottom: 10px; }
.result-pct { font-family: var(--fontH); font-size: 42px; font-weight: 800; }
.result-pct.pass { color: var(--correct); }
.result-pct.fail { color: var(--wrong); }
.result-detail { font-size: 14px; color: var(--text2); margin-top: 4px; }
.result-verdict { font-family: var(--fontH); font-size: 16px; font-weight: 600; margin-top: 8px; }
.result-bar { height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 40px; overflow: hidden; }
.result-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

.review-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
.review-summary { padding: 12px 16px; cursor: pointer; font-size: 12px; color: var(--text); line-height: 1.5; list-style: none; }
.review-summary::-webkit-details-marker { display: none; }
.review-body { padding: 0 16px 14px; font-size: 12px; color: var(--text2); line-height: 1.7; }
.review-correct { color: var(--correct); margin-bottom: 4px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.5s ease; }
.fade-up-2 { animation: fadeUp 0.7s ease; }
.fade-up-3 { animation: fadeUp 0.9s ease; }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div class="loading-text">Chargement des questions depuis ccnareponses.com...</div>
    <div class="loading-progress"><div class="loading-bar" id="loadBar" style="width:10%"></div></div>
    <div class="loading-sub" id="loadStatus">Connexion au site...</div>
  </div>
</div>

<script>
// ─── STATE ─────────────────────────────────────
let allQuestions = [];
let quiz = [];
let qIdx = 0, sel = [], answered = false, score = 0, answers = [];
let screen = "loading";
let currentCat = null;
let timerInterval = null, timeLeft = 0, isTimed = false;
let showExpl = false, reviewAll = false;

const CATS = {
  ospf: { label: "OSPF", color: "#0ef6cc", icon: "🔄" },
  acl: { label: "ACL", color: "#e74c3c", icon: "🛡️" },
  nat: { label: "NAT/PAT", color: "#2ecc71", icon: "🔀" },
  vpn: { label: "VPN/IPsec", color: "#f39c12", icon: "🔒" },
  api: { label: "API/SDN", color: "#e67e22", icon: "📡" },
  virtual: { label: "Virtualisation", color: "#ff6b35", icon: "☁️" },
  wan: { label: "WAN", color: "#3498db", icon: "🌐" },
  qos: { label: "QoS/Trafic", color: "#9b59b6", icon: "📊" },
  troubleshoot: { label: "Dépannage", color: "#1abc9c", icon: "🔧" },
  security: { label: "Sécurité", color: "#c0392b", icon: "⚠️" },
  design: { label: "Architecture", color: "#16a085", icon: "🏗️" },
  other: { label: "Divers", color: "#7f8c8d", icon: "📖" }
};

// ─── FETCH & PARSE ─────────────────────────────
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
];

async function fetchPage() {
  const url = "https://ccnareponses.com/ccna-3-examen-final-ensav7-questions-et-reponses-francais/";
  setLoadStatus("Tentative de connexion...", 15);

  for (let i = 0; i < PROXIES.length; i++) {
    try {
      setLoadStatus(`Proxy ${i+1}/${PROXIES.length}...`, 20 + i * 25);
      const resp = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(15000) });
      if (!resp.ok) continue;
      const html = await resp.text();
      if (html.length < 5000) continue;
      setLoadStatus("Extraction des questions...", 80);
      return html;
    } catch(e) { continue; }
  }
  return null;
}

function categorize(text) {
  const t = text.toLowerCase();
  if (/ospf|ospfv2|dr\/bdr|hello.*dead|lsdb|état de lien|zone unique|contiguïté.*voisin|router.id|lsa |routeur désigné|spf/.test(t)) return "ospf";
  if (/acl|access.list|contrôle d.accès|ace |access.group|masque générique|permit|deny /.test(t)) return "acl";
  if (/\bnat\b|\bpat\b|adresses ip privées|traduction d.adresses|ip nat|pool nat|globale interne/.test(t)) return "nat";
  if (/vpn|ipsec|gre |ssl|tunnel|dmvpn|anyconnect|mgre|site à site|accès.*(distant|distance)/.test(t)) return "vpn";
  if (/\bsdn\b|\bapi\b|\brest\b|\bjson\b|\bxml\b|\byaml\b|http.*method|crud|restful|automatisation/.test(t)) return "api";
  if (/virtual|hyperviseur|cloud|machine virtuelle|data center|reprise après sinistre|spine.leaf|\baci\b/.test(t)) return "virtual";
  if (/\bwan\b|\bdsl\b|frame relay|ligne louée|\bdce\b|\bdte\b|\bcpe\b|boucle locale|\bmpls\b|pppoe|métropolitain/.test(t)) return "wan";
  if (/qos|trafic.*(voix|vidéo)|latence|gigue|marquage|\bcos\b|\bdscp\b|\bfifo\b|cbwfq|file d.attente|mise en forme|congestion|bande passante/.test(t)) return "qos";
  if (/dépannage|baseline|étalon|symptôm|ascendant|descendant|diviser.*conquérir|syslog|\bsnmp\b|\bntp\b|\bcdp\b|\blldp\b|duplex/.test(t)) return "troubleshoot";
  if (/sécurité|virus|malware|zombie|cheval de troie|fuzzer|pénétration|reconnaissance|attaque|hachage|chiffr|asymétrique|vulnérabilité|usurpation/.test(t)) return "security";
  if (/couche.*(accès|distribution|cœur)|convergé|domaine défaillant|catalyst|commutateur|sans fil/.test(t)) return "design";
  return "other";
}

function isMarkedCorrect(li) {
  // The site uses class="correct_answer" on <li> elements or on child elements like <output>
  if (li.classList && li.classList.contains("correct_answer")) return true;
  // Also check child elements (e.g. <output class="correct_answer">)
  const children = li.querySelectorAll(".correct_answer");
  if (children.length > 0) return true;
  return false;
}

function parseQuestions(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  const content = doc.querySelector(".entry-content, .post-content, article") || doc.body;
  
  const questions = [];
  const boldEls = content.querySelectorAll("strong, b");
  
  // Track stats for debugging
  let correctDetected = 0, correctFallback = 0;
  
  for (const bold of boldEls) {
    const text = bold.textContent.trim();
    // Match question patterns like "1. ..." or "_1. ..." or just numbered questions
    const qMatch = text.match(/^_?(\d+)\.\s+(.+)/s);
    if (!qMatch) continue;
    
    const siteNum = qMatch[1]; // Original question number from the site
    const qText = qMatch[2].replace(/\s+/g, " ").trim();
    if (qText.length < 15) continue;
    
    // Determine if multi-select
    const isMulti = /choisissez (deux|trois|2|3)|citez.en (deux|trois)/i.test(text);
    
    // Find options: look at following sibling list items
    let listEl = null;
    let optionEls = [];
    let el = bold.closest("p, div, li") || bold.parentElement;
    let images = [];
    
    // Walk siblings to find the UL/OL with options, collecting images along the way
    let sibling = el.nextElementSibling;
    let attempts = 0;
    while (sibling && attempts < 8) {
      // Collect images found between question and options
      if (sibling.tagName === "P" || sibling.tagName === "DIV" || sibling.tagName === "FIGURE") {
        const imgs = sibling.querySelectorAll("img");
        imgs.forEach(img => {
          const src = img.getAttribute("src") || img.getAttribute("data-src") || "";
          if (src && !src.startsWith("data:") && !src.includes("logo") && !src.includes("flag")) {
            images.push(src);
          }
        });
      }
      if (sibling.tagName === "IMG") {
        const src = sibling.getAttribute("src") || sibling.getAttribute("data-src") || "";
        if (src && !src.startsWith("data:")) images.push(src);
      }
      
      if (sibling.tagName === "UL" || sibling.tagName === "OL") {
        listEl = sibling;
        optionEls = Array.from(sibling.querySelectorAll(":scope > li"));
        break;
      }
      if (sibling.querySelector && sibling.querySelector("ul, ol")) {
        listEl = sibling.querySelector("ul, ol");
        optionEls = Array.from(listEl.querySelectorAll(":scope > li"));
        break;
      }
      sibling = sibling.nextElementSibling;
      attempts++;
    }
    
    if (optionEls.length < 2) continue;
    
    const options = [];
    const correct = [];
    
    optionEls.forEach((li, idx) => {
      const optText = li.textContent.trim();
      if (optText.length === 0) return;
      
      const optIdx = options.length;
      options.push(optText);
      
      // Detect if this option is marked as correct (red/colored on the site)
      if (isMarkedCorrect(li)) {
        correct.push(optIdx);
      }
    });
    
    if (options.length < 2) continue;
    
    // If no correct answer detected via color, fallback to first option
    let colorOk = false;
    if (correct.length === 0) {
      correct.push(0);
      correctFallback++;
    } else {
      correctDetected++;
      colorOk = true;
    }
    
    // Find explanation
    let explanation = "";
    let explEl = listEl ? listEl.nextElementSibling : null;
    let explAttempts = 0;
    while (explEl && explAttempts < 5) {
      const eTxt = explEl.textContent || "";
      if (/expliqu|explanation/i.test(eTxt)) {
        explanation = eTxt.replace(/^[_*]*\s*(Expliqu?e?|Explanation)\s*:?\s*/i, "").trim();
        break;
      }
      // Stop if we hit the next question
      if (/^\*?\*?_?\d+\./.test(eTxt.trim())) break;
      explEl = explEl.nextElementSibling;
      explAttempts++;
    }
    
    questions.push({
      id: questions.length + 1,
      siteNum: siteNum,
      text: qText,
      options: options.slice(0, 6),
      correct: correct,
      multi: isMulti || correct.length > 1,
      explanation: explanation.substring(0, 500),
      cat: categorize(qText),
      images: images,
      _colorOk: colorOk
    });
  }
  
  console.log(`[Parser] ${questions.length} questions parsed. Correct detected by color: ${correctDetected}, fallback: ${correctFallback}`);
  return questions;
}

function setLoadStatus(msg, pct) {
  const el = document.getElementById("loadStatus");
  const bar = document.getElementById("loadBar");
  if (el) el.textContent = msg;
  if (bar) bar.style.width = pct + "%";
}

// ─── MANUAL PASTE FALLBACK ─────────────────────
function showManualInput() {
  screen = "manual";
  render();
}

function parseFromPaste() {
  const textarea = document.getElementById("pasteArea");
  if (!textarea) return;
  const html = textarea.value;
  if (html.length < 100) return alert("Contenu trop court. Collez le code source complet de la page.");
  
  allQuestions = parseQuestions(html);
  if (allQuestions.length < 5) {
    // Fallback: try simple text parsing
    allQuestions = parseSimpleText(html);
  }
  
  if (allQuestions.length > 0) {
    screen = "home";
    render();
  } else {
    alert("Impossible d'extraire les questions. Assurez-vous de coller le code source HTML complet.");
  }
}

function parseSimpleText(text) {
  const questions = [];
  // Try to match patterns like bold numbered questions followed by bullet points
  const regex = /\*\*_?(\d+)\.\s+/g;
  const splits = text.split(/\*\*_?\d+\.\s+/);
  const nums = [];
  let m;
  while ((m = regex.exec(text)) !== null) nums.push(m[1]);
  
  for (let i = 1; i < splits.length; i++) {
    const block = splits[i];
    const siteNum = nums[i - 1] || String(i);
    const lines = block.split("\n").map(l => l.trim()).filter(l => l);
    if (lines.length < 3) continue;
    
    // First line(s) = question text (up to first *)
    let qText = "";
    let optStart = 0;
    for (let j = 0; j < lines.length; j++) {
      if (lines[j].startsWith("* ") || lines[j].startsWith("- ")) {
        optStart = j;
        break;
      }
      qText += (qText ? " " : "") + lines[j].replace(/\*\*/g, "");
    }
    
    if (!qText || optStart === 0) continue;
    
    const options = [];
    for (let j = optStart; j < lines.length; j++) {
      const line = lines[j];
      if (line.startsWith("* ") || line.startsWith("- ")) {
        options.push(line.replace(/^[*\-]\s+/, "").replace(/\*\*/g, ""));
      } else break;
    }
    
    if (options.length < 2) continue;
    
    const isMulti = /choisissez|citez/i.test(qText);
    
    // Look for explanation
    let explanation = "";
    const explMatch = block.match(/(?:_?Expliqu?e?|Explanation)\s*:?\s*\*?\*?\s*(.+?)(?=\*\*\d+\.|\n\n|$)/is);
    if (explMatch) explanation = explMatch[1].trim().substring(0, 500);
    
    questions.push({
      id: questions.length + 1,
      siteNum: siteNum,
      text: qText.trim(),
      options: options.slice(0, 6),
      correct: [0],
      multi: isMulti,
      explanation,
      cat: categorize(qText)
    });
  }
  
  return questions;
}

// ─── QUIZ LOGIC ────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(cat, timed, limit) {
  let qs = cat ? allQuestions.filter(q => q.cat === cat) : [...allQuestions];
  quiz = shuffle(qs);
  if (limit) quiz = quiz.slice(0, limit);
  qIdx = 0; sel = []; answered = false; score = 0; answers = [];
  showExpl = false; reviewAll = false; currentCat = cat;
  
  if (timed) {
    isTimed = true;
    timeLeft = quiz.length * 60;
    startTimer();
  } else {
    isTimed = false; timeLeft = 0;
  }
  screen = "quiz";
  render();
  window.scrollTo(0, 0);
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
    renderTimer();
  }, 1000);
}

function renderTimer() {
  const el = document.getElementById("timer");
  if (el) {
    const m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
    const s = String(timeLeft % 60).padStart(2, "0");
    el.textContent = m + ":" + s;
    el.className = "timer" + (timeLeft < 60 ? " danger" : "");
  }
}

function toggleOpt(i) {
  if (answered) return;
  const q = quiz[qIdx];
  if (q.multi) {
    sel = sel.includes(i) ? sel.filter(x => x !== i) : [...sel, i];
  } else {
    sel = [i];
  }
  render();
}

function submitAnswer() {
  if (!sel.length) return;
  const q = quiz[qIdx];
  const ok = q.correct.length === sel.length && q.correct.every(c => sel.includes(c));
  if (ok) score++;
  answers.push({ qId: q.id, sel, ok });
  answered = true;
  showExpl = false;
  render();
}

function nextQuestion() {
  if (qIdx + 1 >= quiz.length) return finishQuiz();
  qIdx++; sel = []; answered = false; showExpl = false;
  render();
  window.scrollTo(0, 0);
}

function finishQuiz() {
  clearInterval(timerInterval);
  isTimed = false;
  screen = "results";
  render();
  window.scrollTo(0, 0);
}

// ─── RENDER ────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  
  if (screen === "loading") return; // handled by initial HTML
  
  if (screen === "manual") { renderManual(app); return; }
  if (screen === "home") { renderHome(app); return; }
  if (screen === "quiz") { renderQuiz(app); return; }
  if (screen === "results") { renderResults(app); return; }
}

    ${detPct < 50 ? `<div style="background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#ff8a80;line-height:1.6" class="fade-up">
      ⚠️ Seulement <b>${colorDetected}</b> réponses détectées par couleur. Pour de meilleurs résultats, utilisez <b>"📋 Recharger"</b> ci-dessous et collez le <b>code source HTML</b> (<kbd style="background:var(--bg3);padding:1px 5px;border-radius:3px">Ctrl+U</kbd> sur la page du site).
    </div>` : ""}
    
    <div class="action-grid fade-up-2">
      <button class="action-btn" style="background:linear-gradient(135deg,var(--accent),#0ac4a0);color:#060a12" onclick="startQuiz(null,false)">
        <span class="label">▶ Examen complet</span>
        <span class="desc">${total} questions — sans limite</span>
      </button>

    <button class="btn btn-ghost btn-block fade-up-2" style="font-size:11px" onclick="showManualInput()">📋 Recharger / Coller manuellement les questions</button>
    
    <div class="cat-title fade-up-3">Par catégorie</div>
    <div class="cat-grid fade-up-3">${catHTML}</div>
  `;
}

function renderQuiz(app) {
  const q = quiz[qIdx];
  const ct = CATS[q.cat] || CATS.other;
  const prog = ((qIdx + (answered ? 1 : 0)) / quiz.length * 100).toFixed(1);
  
  let optsHTML = "";
  q.options.forEach((opt, i) => {
    const isSel = sel.includes(i);
    const isOk = q.correct.includes(i);
    let cls = "opt";
    if (answered) {
      if (isOk) cls += " correct done";
      else if (isSel) cls += " wrong done";
      else cls += " done";
    } else if (isSel) cls += " selected";
    
    const markerCls = "opt-marker" + (q.multi ? " multi" : "");
    let markerContent = String.fromCharCode(65 + i);
    if (answered && isOk) markerContent = "✓";
    else if (answered && isSel && !isOk) markerContent = "✗";
    
    optsHTML += `<button class="${cls}" onclick="toggleOpt(${i})"><span class="${markerCls}">${markerContent}</span><span>${escHTML(opt)}</span></button>`;
  });
  
  let explHTML = "";
  if (answered && q.explanation) {
    explHTML = `<button class="expl-toggle" onclick="showExpl=!showExpl;render()">${showExpl?"▾":"▸"} Explication</button>`;
    if (showExpl) explHTML += `<div class="expl-box">${escHTML(q.explanation)}</div>`;
  }
  
  const btnHTML = answered
    ? `<button class="btn btn-secondary btn-block" onclick="nextQuestion()">${qIdx+1>=quiz.length?"Voir les résultats →":"Question suivante →"}</button>`
    : `<button class="btn ${sel.length?"btn-primary":"btn-ghost"} btn-block" onclick="submitAnswer()" ${sel.length?"":"disabled"}>Valider</button>`;
  
  app.innerHTML = `
    <div class="quiz-bar">
      <button class="btn btn-ghost btn-sm" onclick="clearInterval(timerInterval);screen='home';render()">← Quitter</button>
      <div style="display:flex;align-items:center;gap:16px">
        ${isTimed ? '<div class="timer" id="timer"></div>' : ""}
        <span style="font-size:13px;color:var(--text2)"><b style="color:var(--accent)">${qIdx+1}</b>/${quiz.length}</span>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="q-meta">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="q-cat">${ct.icon} ${ct.label}</span>
        <span class="q-sitenum">Site Q.${q.siteNum || q.id}</span>
        ${q._colorOk ? '<span style="font-size:9px;color:var(--correct);opacity:0.7" title="Bonne réponse détectée par couleur sur le site">✓ vérifié</span>' : '<span style="font-size:9px;color:var(--wrong);opacity:0.5" title="Bonne réponse non détectée — vérifiez sur le site">⚠ non vérifié</span>'}
      </div>
      <span class="q-score">Score: <b>${score}</b></span>
    </div>
    <div class="fade-up">
      <div class="q-text">${escHTML(q.text)}</div>
      ${q.images && q.images.length > 0 ? `<div class="q-images">${q.images.map(src => `<img src="${escHTML(src)}" alt="Illustration question" loading="lazy" />`).join("")}</div>` : ""}
      ${q.multi ? '<div class="q-multi">⚡ Plusieurs réponses attendues</div>' : ""}
    </div>
    <div class="opts">${optsHTML}</div>
    ${explHTML}
    ${btnHTML}
  `;
  
  if (isTimed) renderTimer();
}

function renderResults(app) {
  const pct = quiz.length ? Math.round(score / quiz.length * 100) : 0;
  const pass = pct >= 70;
  const wrong = answers.filter(a => !a.ok);
  
  // Category breakdown
  let catHTML = "";
  for (const [k, c] of Object.entries(CATS)) {
    const ca = answers.filter(a => { const qq = allQuestions.find(x => x.id === a.qId); return qq && qq.cat === k; });
    if (!ca.length) continue;
    const cc = ca.filter(a => a.ok).length;
    const cp = Math.round(cc / ca.length * 100);
    catHTML += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:${c.color}">${c.icon} ${c.label}</span>
        <span style="font-size:12px;font-weight:600;color:${cp>=70?"var(--correct)":"var(--wrong)"}">${cc}/${ca.length} (${cp}%)</span>
      </div>
      <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${cp}%;background:${cp>=70?c.color:"var(--wrong)"};border-radius:2px"></div>
      </div>
    </div>`;
  }
  
  // Wrong answers review
  const showWrong = reviewAll ? wrong : wrong.slice(0, 10);
  let reviewHTML = "";
  showWrong.forEach(a => {
    const qq = allQuestions.find(x => x.id === a.qId);
    if (!qq) return;
    const cc = CATS[qq.cat] || CATS.other;
    const correctOpts = qq.correct.map(c => `<p style="padding-left:12px">• ${escHTML(qq.options[c])}</p>`).join("");
    reviewHTML += `<details class="review-item">
      <summary class="review-summary"><span style="color:${cc.color};margin-right:8px">${cc.icon}</span><span class="q-sitenum" style="margin-right:6px">Site Q.${qq.siteNum || qq.id}</span> ${escHTML(qq.text.substring(0, 90))}...</summary>
      <div class="review-body">
        <p class="review-correct">✓ Bonne(s) réponse(s) :</p>
        ${correctOpts}
        ${qq.explanation ? `<p style="margin-top:8px;font-style:italic">${escHTML(qq.explanation)}</p>` : ""}
      </div>
    </details>`;
  });
  
  app.innerHTML = `
    <div class="result-hero">
      <div class="result-emoji">${pass ? "🎉" : "📚"}</div>
      <div class="result-pct ${pass?"pass":"fail"}">${pct}%</div>
      <div class="result-detail">${score} / ${quiz.length} bonnes réponses</div>
      <div class="result-verdict" style="color:${pass?"var(--correct)":"var(--wrong)"}">
        ${pass ? "Félicitations — Examen réussi !" : "Continuez à réviser — 70% requis"}
      </div>
    </div>
    <div class="result-bar">
      <div class="result-bar-fill" style="width:${pct}%;background:${pass?"linear-gradient(90deg,var(--correct),#69f0ae)":"linear-gradient(90deg,var(--wrong),#ff8a80)"}"></div>
    </div>
    
    <div class="cat-title">Par catégorie</div>
    ${catHTML}
    
    ${wrong.length > 0 ? `
      <div class="cat-title" style="margin-top:32px">Questions à revoir (${wrong.length})</div>
      ${reviewHTML}
      ${!reviewAll && wrong.length > 10 ? `<button class="btn btn-ghost btn-block" onclick="reviewAll=true;render()">Voir les ${wrong.length} erreurs</button>` : ""}
    ` : ""}
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px">
      <button class="btn btn-primary" onclick="startQuiz(${currentCat ? `'${currentCat}'` : "null"},false)">🔄 Recommencer</button>
      <button class="btn btn-ghost" onclick="screen='home';render()">← Menu principal</button>
    </div>
  `;
}

function escHTML(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
